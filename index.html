<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="header">
      <div class="logo">
      </div>

      <div class="delivery"> 
         <i class="fa-solid fa-location-dot"> </i>
         <p class="loc-text">
            <span class="loc-text1">Deliver to</span>
            Bangladesh
         </p>
      </div>

      <div class="search-box">
          <select name="category" class="category">
            <option value="All" selected>All</option>
            <option value="Books">Books</option>
            <option value="Baby">Baby</option>
            <option value="Luggage">Luggage</option>
            <option value="Kitchen">Kitchen</option>
            <option value="Electronics">Electronics</option>
          </select>
          <form class="form">
          <input type="text"  placeholder=" Search Amazon" class="search-text">
          <button type="submit" class="submit">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
          </form>
      </div>


      <div class="flag-box">
        <div class="flag">
        </div>
        <span class="flag-text">EN</span>
      </div>

      <div class="account-box">
        <span class="account-text1">Hello, sign in</span>
        <span class="account-text2">Account & Lists</span>
      </div>

      <div class="return-box">
        <span class="return-text1">Returns</span>
        <span class="return-text2">& Orders</span>
      </div>
       
      <div class="cart-box">
        <i class="fa-solid fa-cart-shopping"></i>
        <span>Cart</span>
      </div>
    </div>

    <div class="header2">
      <div>
        <i class="fa fa-bars"></i>
         All 
        </div>
      <div> Today's Deals </div>
      <div> Gift Cards </div>
      <div> Sell </div>
      <div> Registry </div>
      <div> Prime vedio </div>
      <div> Customer Service </div>
    </div>

  </body>
